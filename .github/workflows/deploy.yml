name: Deploy Nova ERP

on:
  push:
    tags:
      - 'v*' # Triggers workflow on tag push matching v1.0, v2.1.3, etc.

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1. Build & Push Backend API Image
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nova-api:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/nova-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. Build & Push Frontend Image
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nova-frontend:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/nova-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
