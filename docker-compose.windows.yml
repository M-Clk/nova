services:
  api:
    image: mclk2148/nova-api:latest
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=novadb;Username=nova;Password=nova
      Jwt__Secret: Nova_System_Super_Secret_Key_2026_AtLeast32Chars!
      Jwt__ExpiryMinutes: "15"
      # Windows: kurulum dizinini değiştirdiyseniz aşağıdaki yolları güncelleyin.
      # install-windows.ps1 varsayılan olarak C:\Nova klasörüne kurar.
      Update__ComposeFilePath: /host/docker-compose.windows.yml
      Update__UpdateScriptPath: /host/scripts/update-nova.ps1
    volumes:
      # Windows Docker Desktop named pipe (Docker socket)
      - type: npipe
        source: \\.\pipe\docker_engine
        target: \\.\pipe\docker_engine
      # Nova kurulum dizinini container'a bağla (host path → /host)
      # install-windows.ps1 ile C:\Nova'ya kurulumda bu yol otomatik ayarlanır.
      - C:\Nova:/host
    ports:
      - "5000:80"
    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    image: mclk2148/nova-frontend:latest
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: always

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: nova
      POSTGRES_DB: novadb
    ports:
      - "5432:5432"
    volumes:
      - nova-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova -d novadb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

volumes:
  nova-postgres-data:
