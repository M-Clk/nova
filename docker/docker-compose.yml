services:
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=novadb;Username=nova;Password=nova
    ports:
      - "5000:80"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: nova
      POSTGRES_DB: novadb
    ports:
      - "5432:5432"
    volumes:
      - nova-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova -d novadb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nova-postgres-data:
